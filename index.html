<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cake Catching Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fffdf6; display:flex; justify-content:center; align-items:center;
         min-height:100vh; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; }
  #wrap { position:relative; }
  canvas { display:block; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.12); }
  #startScreen { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:rgba(255,253,230,.92);
    border-radius:12px; z-index:10; }
  #startScreen h1 { color:#50280a; font-size:36px; margin-bottom:8px; }
  #startScreen p { color:#a07850; font-size:16px; margin-bottom:24px; }
  #startScreen button { background:#ffc8d2; color:#50280a; border:none; padding:14px 48px;
    font-size:20px; border-radius:30px; cursor:pointer; transition:.2s; }
  #startScreen button:hover { background:#ffb0c0; transform:scale(1.05); }
  #muteBtn { position:absolute; top:8px; right:8px; z-index:20; background:rgba(255,255,255,.7);
    border:none; border-radius:50%; width:36px; height:36px; font-size:20px; cursor:pointer; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="600"></canvas>
  <button id="muteBtn">🔊</button>
  <div id="startScreen">
    <h1>🎂 Cake Catcher</h1>
    <p>← → 或 A D 控制篮子 ｜ 手机触屏滑动</p>
    <button onclick="startGame()">开始游戏</button>
  </div>
</div>
<script>
// ============ 常量 ============
const W=800, H=600, FPS=60, CAKE_W=50, WIN_COUNT=44, MAX_MISS=5;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function resize(){
  const s=Math.min(innerWidth/W, innerHeight/H, 1);
  canvas.style.width=W*s+'px'; canvas.style.height=H*s+'px';
  const wrap=document.getElementById('wrap');
  wrap.style.width=W*s+'px'; wrap.style.height=H*s+'px';
}
resize(); addEventListener('resize',resize);

// ============ 音频 ============
let audioCtx, muted=false;
let bgmSource, bgmGain;
document.getElementById('muteBtn').onclick=()=>{ muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
  if(bgmGain) bgmGain.gain.value=muted?0:0.4; };

function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function playTone(freq,dur,vol){
  if(!audioCtx||muted) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sine'; o.frequency.value=freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

const catchSounds=[
  ()=>playTone(880,.15,.4),
  ()=>playTone(1046,.15,.4),
  ()=>playTone(1318,.2,.5)
];

function playMissSound(){
  if(!audioCtx||muted) return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.15,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-(i/d.length)**.5)*.3;
  const s=audioCtx.createBufferSource(); s.buffer=buf;
  const g=audioCtx.createGain(); g.gain.value=.4;
  s.connect(g); g.connect(audioCtx.destination); s.start();
}

async function loadBGM(){
  try{
    const resp=await fetch('bgm.flac');
    if(!resp.ok) throw new Error('文件未找到');
    const arrayBuf=await resp.arrayBuffer();
    const audioBuf=await audioCtx.decodeAudioData(arrayBuf);
    bgmGain=audioCtx.createGain();
    bgmGain.gain.value=muted?0:0.4;
    bgmGain.connect(audioCtx.destination);
    bgmSource=audioCtx.createBufferSource();
    bgmSource.buffer=audioBuf;
    bgmSource.loop=true;
    bgmSource.connect(bgmGain);
    bgmSource.start();
    console.log('🎵 背景音乐加载成功');
  }catch(e){ console.log('💡 没找到bgm.flac，静音模式运行'); }
}

function stopBGM(){ if(bgmSource){try{bgmSource.stop();}catch(e){}} bgmSource=null; }
function startBGM(){ if(bgmSource) return; loadBGM(); }

// ============ 颜色 ============
const C={
  cream:'#fffdf6', grid:'#e6dcc8', uiBrown:'#50280a', heartPink:'#ffc8d2',
  pink:'#ffc0cb', basketDark:'#654321', basketLight:'#a0522d',
  bb1:'#bfefff', bb2:'#aeeeee', bb3:'#87ceeb', icing:'#ffffff',
  accent:'#4682b4', pastelY:'#ffe082', flameY:'#fff176', flameO:'#ffd54f'
};

// ============ 特效类 ============
let particles=[];
class Particle{
  constructor(x,y,color,star){
    this.x=x;this.y=y;this.color=color;this.star=star;this.isText=false;
    const a=Math.random()*Math.PI*2, sp=star?2+Math.random()*4:1+Math.random()*3;
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp-(star?3:1);
    this.life=1; this.decay=.02+Math.random()*.03;
    this.size=star?3+Math.random()*4:2+Math.random()*3;
  }
  update(){ 
    this.x+=this.vx; 
    this.vy+=.15; 
    this.y+=this.vy; 
    this.life-=this.decay; 
    return this.life>0; 
  }
  draw(){
    const s=this.size*this.life; if(s<=0)return;
    ctx.globalAlpha=this.life;
    if(this.isText){
      // 马卡龙字母渲染
      const fontSize=Math.max(10, 30*this.life);
      ctx.font=`bold ${fontSize}px 'Segoe UI', sans-serif`;
      ctx.textAlign='center';
      ctx.strokeStyle='rgba(80, 40, 10, 0.25)'; // 棕色描边
      ctx.lineWidth=3;
      ctx.strokeText(this.text, this.x, this.y);
      ctx.fillStyle=this.color;
      ctx.fillText(this.text, this.x, this.y);
      ctx.textAlign='left';
    } else if(this.star){
      ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=this.color;ctx.fillRect(this.x,this.y,s,s);
    }
    ctx.globalAlpha=1;
  }
}

// 生成马卡龙色系文字粒子
function spawnTextParticle(x, y) {
  const letters = ['K', 'W', 'Y'];
  // 樱花粉、薄荷绿、香芋紫
  const colors = ['#FFB7C5', '#A8E6CF', '#D4A5FF']; 
  const idx = Math.floor(Math.random() * letters.length);
  
  const p = new Particle(x, y, colors[idx], false);
  p.isText = true;
  p.text = letters[idx];
  p.vx = (Math.random() - 0.5) * 5;
  p.vy = -(4 + Math.random() * 4);
  p.decay = 0.015; 
  p.size = 30;
  particles.push(p);
}

// ============ 蛋糕绘制 ============
function drawCake(cx,by,s){
  const bw=240*s, bh=65*s, bx=cx-bw/2, rt=by-bh;
  ctx.fillStyle=C.bb2; ctx.fillRect(bx,rt,bw,bh);
  ctx.fillStyle=C.bb1; ctx.beginPath();
  ctx.ellipse(cx,rt,bw/2,16*s,0,Math.PI,0); ctx.fill();
  drawIcing(cx,rt,bw/2,16*s,s); drawDots(bx,rt,bw,bh,s);

  const mw=180*s, mh=60*s, mx=cx-mw/2, mrt=rt-2*16*s+5*s;
  ctx.fillStyle=C.bb3; ctx.fillRect(mx,mrt,mw,mh);
  ctx.fillStyle=C.bb2; ctx.beginPath();
  ctx.ellipse(cx,mrt,mw/2,15*s,0,Math.PI,0); ctx.fill();
  drawIcing(cx,mrt,mw/2,15*s,s); drawDots(mx,mrt,mw,mh,s);

  const tw=120*s, th=45*s, tx=cx-tw/2, trt=mrt-2*15*s+5*s;
  ctx.fillStyle=C.bb1; ctx.fillRect(tx,trt,tw,th);
  ctx.fillStyle=C.bb3; ctx.beginPath();
  ctx.ellipse(cx,trt,tw/2,11*s,0,Math.PI,0); ctx.fill();
  drawIcing(cx,trt,tw/2,11*s,s);

  const cby=trt-11*s;
  for(let i=0;i<7;i++){
    const cx_i=tx+tw/8*(i+1);
    ctx.fillStyle=C.pastelY;
    ctx.fillRect(cx_i-3*s,cby-35*s,6*s,35*s);
    ctx.fillStyle=C.flameO;
    ctx.beginPath();ctx.arc(cx_i,cby-35*s-5*s,9*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=C.flameY;
    ctx.beginPath();ctx.arc(cx_i,cby-35*s-5*s,5*s,0,Math.PI*2);ctx.fill();
  }
}

function drawIcing(cx,rt,hw,hh,s){
  ctx.strokeStyle=C.icing; ctx.lineWidth=Math.max(2,5*s);
  ctx.beginPath();
  for(let i=0;i<=100;i++){const a=Math.PI*i/100;
    const px=cx+hw*Math.cos(a), py=rt+hh*Math.sin(a);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}
  ctx.stroke();
  ctx.fillStyle=C.icing;
  for(let i=1;i<10;i+=2){const a=Math.PI*i/10;
    const px=cx+hw*Math.cos(a), py=rt+hh*Math.sin(a);
    ctx.beginPath();ctx.ellipse(px,py,10*s/2,14*s/2,0,0,Math.PI*2);ctx.fill();}
}

function drawDots(x,y,w,h,s){
  const r=Math.max(2,6*s);
  ctx.fillStyle=C.accent;
  for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(x+w/6*(i+1),y+h*.45,r,0,Math.PI*2);ctx.fill();}
}

// ============ 游戏状态 ============
let state='idle';
let basket={x:345,y:545,w:110,h:35,speed:7};
let cakes=[], score=0, missed=0, spawnTimer=0, spawnRate=35;
let winFrame=0, loseFrame=0, winPetals=[];

function resetGame(){
  basket.x=345; cakes=[]; score=0; missed=0; spawnTimer=0; spawnRate=35;
  winFrame=0; loseFrame=0; particles=[]; winPetals=[]; state='playing';startBGM();
}

// ============ 输入 ============
const keys={};
addEventListener('keydown',e=>{keys[e.key]=true; if(e.key===' '&&state!=='playing') resetGame();});
addEventListener('keyup',e=>keys[e.key]=false);

let touchX=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchX=e.touches[0].clientX;
  if(state!=='playing') resetGame();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const newX=e.touches[0].clientX;
  const rect=canvas.getBoundingClientRect();
  const scale=W/rect.width;
  basket.x+=(newX-touchX)*scale; touchX=newX;
  basket.x=Math.max(0,Math.min(W-basket.w,basket.x));
},{passive:false});
canvas.addEventListener('touchend',()=>touchX=null);

// ============ 更新 ============
function update(){
  particles=particles.filter(p=>p.update());
  winPetals.forEach(p=>{p.y+=p.speed; p.x+=Math.sin(winFrame*.02+p.off)*.5;});
  winPetals=winPetals.filter(p=>p.y<H+20);
  if(state!=='playing') return;

  if(keys['ArrowLeft']||keys['a']||keys['A']) basket.x=Math.max(0,basket.x-basket.speed);
  if(keys['ArrowRight']||keys['d']||keys['D']) basket.x=Math.min(W-basket.w,basket.x+basket.speed);

  spawnTimer++;
  if(spawnTimer>=spawnRate){ spawnCake(); spawnTimer=0; }

  for(let i=cakes.length-1;i>=0;i--){
    const c=cakes[i]; c.y+=c.speed;
    if(c.x<basket.x+basket.w && c.x+c.w>basket.x && c.y+c.h>basket.y && c.y<basket.y+basket.h){
      cakes.splice(i,1); score++;
      score<15?catchSounds[0]():score<35?catchSounds[1]():catchSounds[2]();
      spawnCatchFX(c.x+c.w/2, c.y+c.h);
      if(spawnRate>18) spawnRate-=.2;
    } else if(c.y>H){
      cakes.splice(i,1); missed++;
      playMissSound(); spawnMissFX(c.x+c.w/2, H-10);
      if(missed>=MAX_MISS){ state='lose'; stopBGM(); }
    }
  }
  if(score>=WIN_COUNT){
    state='win'; stopBGM();
    for(let i=0;i<60;i++) winPetals.push({
      x:Math.random()*W, y:-Math.random()*H, speed:.5+Math.random(),
      size:4+Math.random()*4, color:['#ffc8d2','#ffc0cb','#ffdce6','#fff5f5'][i%4],
      off:Math.random()*Math.PI*2
    });
  }
}

function spawnCake(){
  cakes.push({x:Math.random()*(W-CAKE_W), y:-CAKE_W, w:CAKE_W, h:CAKE_W,
    speed:2.5+Math.random()*2.5});
}

function spawnCatchFX(x,y){
  const cols=['#ffff00','#fff','#ffe082','#ffc8c8'];
  for(let i=0;i<12;i++) particles.push(new Particle(x,y,cols[i%4],true));
  
  const textCount = 2 + Math.floor(Math.random() * 2); 
  for(let i=0; i<textCount; i++){
    spawnTextParticle(x + (Math.random()-0.5)*40, y);
  }
}

function spawnMissFX(x,y){
  const cols=['#bfefff','#aeeeee','#87ceeb','#fff','#4682b4'];
  for(let i=0;i<15;i++) particles.push(new Particle(x,y,cols[i%5],false));
}

// ============ 绘制 ============
function draw(){
  ctx.fillStyle=C.cream; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=C.grid; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  cakes.forEach(c=>drawCake(c.x+c.w/2, c.y+c.h, .2));
  particles.forEach(p=>p.draw());
  drawBasket();
  drawUI();

  if(state==='win') drawWin();
  if(state==='lose') drawLose();
}

function drawBasket(){
  const {x,y,w}=basket, h=35, cx=x+w/2;

  ctx.strokeStyle=C.basketDark;
  ctx.lineWidth=4;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.arc(cx, y+5, w/2-5, Math.PI, 0, false);
  ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(cx, y+5, w/2-9, Math.PI, 0, false);
  ctx.stroke();

  ctx.fillStyle=C.basketLight;
  ctx.beginPath();
  ctx.moveTo(x+5, y);
  ctx.lineTo(x+w-5, y);
  ctx.lineTo(x+w-12, y+h);
  ctx.lineTo(x+12, y+h);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle=C.basketDark;
  ctx.beginPath();
  ctx.ellipse(cx, y, w/2, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle=C.basketLight;
  ctx.beginPath();
  ctx.ellipse(cx, y-1, w/2-4, 4, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle='rgba(101,67,33,0.35)';
  ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){
    const yy=y+8+i*9;
    ctx.beginPath(); ctx.moveTo(x+10,yy); ctx.lineTo(x+w-10,yy); ctx.stroke();
  }
  for(let i=0;i<5;i++){
    const xx=x+18+i*18;
    ctx.beginPath(); ctx.moveTo(xx,y+3); ctx.lineTo(xx-2,y+h-3); ctx.stroke();
  }
}

function drawUI(){
  ctx.fillStyle=C.uiBrown; ctx.font='bold 36px sans-serif';
  ctx.fillText(`Cakes: ${score}/${WIN_COUNT}`,20,48);
  const lives=MAX_MISS-missed;
  ctx.fillStyle=C.heartPink; ctx.font='bold 28px sans-serif';
  ctx.fillText('Lives: ',20,82);
  for(let i=0;i<lives;i++){
    drawHeart(100+i*28,74,7);
  }
  ctx.fillStyle=C.uiBrown; ctx.font='28px sans-serif';
  ctx.fillText(`Level: ${Math.floor((35-spawnRate)/1.2)+1}`, W-160,48);
}

function drawHeart(hx,hy,r){
  ctx.fillStyle=C.heartPink;
  ctx.beginPath();ctx.arc(hx-6,hy-4,r,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(hx+6,hy-4,r,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(hx-13,hy);ctx.lineTo(hx,hy+14);ctx.lineTo(hx+13,hy);ctx.fill();
}

function drawWin(){
  winFrame++;
  winPetals.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.ellipse(p.x,p.y,p.size,p.size*.6,0,0,Math.PI*2);ctx.fill();
  });
  if(winPetals.length<100&&winFrame%10===0)
    winPetals.push({x:Math.random()*W,y:-20,speed:.5+Math.random(),
      size:4+Math.random()*4,color:['#ffc8d2','#ffc0cb','#ffdce6'][Math.floor(Math.random()*3)],
      off:Math.random()*Math.PI*2});

  ctx.fillStyle='rgba(255,240,220,0.63)';ctx.fillRect(0,0,W,H);
  drawCake(W/2, H/2+80, .55);

  const fyBase=H/2+80-120;
  for(let i=0;i<5;i++){
    const fx=W/2-40+i*20, flicker=Math.sin(winFrame*.1+i)*3, fy=fyBase+flicker;
    ctx.fillStyle='rgba(255,255,200,0.3)';
    ctx.beginPath();ctx.arc(fx,fy-20,15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=C.flameO;
    ctx.beginPath();ctx.ellipse(fx,fy-12,5,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=C.flameY;
    ctx.beginPath();ctx.ellipse(fx,fy-10,3,6,0,0,Math.PI*2);ctx.fill();
  }

  ctx.textAlign='center';
  ctx.fillStyle=C.uiBrown; ctx.font='bold 64px sans-serif';
  ctx.fillText('Happy Birthday!',W/2,H/2-120);
  ctx.fillStyle=C.heartPink; ctx.font='28px sans-serif';
  ctx.fillText(`Successfully caught ${score} cakes!`,W/2,H/2-75);
  ctx.fillStyle=C.basketLight; ctx.font='28px sans-serif';
  ctx.fillText('Press SPACE to restart',W/2,H/2+140);
  ctx.textAlign='left';
}

function drawLose(){
  loseFrame++;
  ctx.fillStyle='rgba(220,225,230,0.7)';ctx.fillRect(0,0,W,H);
  const alpha=Math.min(1,loseFrame/50);
  ctx.globalAlpha=alpha;

  const scx=W/2, scy=H/2-80;
  drawCake(scx,scy+20,.3);
  ctx.fillStyle=C.uiBrown;
  ctx.beginPath();ctx.arc(scx-10,scy-15,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(scx+10,scy-15,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(scx,scy-2,8,0.2,Math.PI-.2);ctx.stroke();
  const tearY=scy-18+Math.sin(loseFrame*.1)*2;
  ctx.fillStyle=C.bb3;
  ctx.beginPath();ctx.ellipse(scx+18,tearY,3,4,0,0,Math.PI*2);ctx.fill();

  ctx.textAlign='center';
  ctx.fillStyle=C.heartPink; ctx.font='bold 42px sans-serif';
  ctx.fillText('Almost there~',W/2,H/2+40);
  ctx.fillStyle=C.uiBrown; ctx.font='28px sans-serif';
  ctx.fillText(`Cakes: ${score}/${WIN_COUNT}`,W/2,H/2+90);
  if(loseFrame>30){
    ctx.globalAlpha=Math.min(1,(loseFrame-30)/30);
    ctx.fillStyle=C.accent; ctx.font='28px sans-serif';
    ctx.fillText('Press SPACE to restart',W/2,H/2+140);
  }
  ctx.textAlign='left';
  ctx.globalAlpha=1;
}

function loop(){
  update(); draw(); requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  initAudio(); loadBGM(); resetGame(); loop();
}
</script>
</body>
</html>
